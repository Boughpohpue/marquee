    <script type="text/javascript">
      const longVerticalText = `
        Line 1<br/>
        Line 2<br/>
        Line 3<br/>
        Line 5<br/>
        Line 4<br/>
        Line 6<br/>
        Line 7<br/>
        Line 8`;
      Marquee.create(
        longVerticalText,
        document.body,
        "slide_1a",
        "width: 333px; height: 44px; background: lightgray;",
        { behavior: MqBehavior.SLIDE, direction: MqDirection.UP, speed: MqSpeed.SLOW, allowHtml: true });
      Marquee.create(
        longVerticalText,
        document.body,
        "slide_2a",
        "width: 333px; height: 100px; background: lightblue; font-weight: bolder;",
        { behavior: MqBehavior.SLIDE, playback: 3, direction: MqDirection.DOWN, speed: MqSpeed.NORMAL, range: MqRange.OUTER, allowHtml: true });
      Marquee.create(
        longVerticalText,
        document.body,
        "slide_3a",
        "width: 333px; height: 100px; background: darkgray; font-weight: bold;",
        { behavior: MqBehavior.SLIDE, direction: MqDirection.UP, speed: MqSpeed.SLOW, range: MqRange.INNER, allowHtml: true });
      Marquee.create(
        longVerticalText,
        document.body,
        "slide_3a",
        "width: 333px; height: 100px; background: gray; font-weight: bold;",
        { behavior: MqBehavior.SLIDE, playback: MqPlayback.BOUNCE, direction: MqDirection.UP, speed: MqSpeed.SLOW, range: MqRange.INNER, allowHtml: true });

        longVerticalText,

        { behavior: MqBehavior.SLIDE, playback: MqPlayback.BOUNCE, direction: MqDirection.DOWN, speed: MqSpeed.FAST, allowHtml: true });
